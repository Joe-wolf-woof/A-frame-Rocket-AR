<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Jet Engine XR Prototype</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="jet-engine" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            
            <a-entity id="engine-group" position="0 0 0" scale="0.5 0.5 0.5">
                
                <a-entity id="part-fan" 
                          gltf-model="#jet-engine" 
                          position="0 0 0"
                          animation="property: position; to: 0 0 1.5; dur: 1000; startEvents: explode; resumeEvents: assemble"
                          animation__reverse="property: position; to: 0 0 0; dur: 1000; startEvents: implode">
                </a-entity>

                <a-entity id="part-cowl" 
                          gltf-model="#jet-engine" 
                          position="0 0 0"
                          animation="property: position; to: 1.5 0 0; dur: 1000; startEvents: explode"
                          animation__reverse="property: position; to: 0 0 0; dur: 1000; startEvents: implode">
                </a-entity>

                <a-entity id="part-core" gltf-model="#jet-engine" position="0 0 0"></a-entity>

            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let isExploded = false;
        
        // 画面全体がタップされた時の処理
        document.body.addEventListener('click', () => {
            const fan = document.querySelector('#part-fan');
            const cowl = document.querySelector('#part-cowl');

            if (!isExploded) {
                // 各パーツに「explode（分解）」イベントを発火
                fan.emit('explode');
                cowl.emit('explode');
                isExploded = true;
                console.log("ジェットエンジンを分解しました");
            } else {
                // 各パーツに「implode（組み立て）」イベントを発火
                fan.emit('implode');
                cowl.emit('implode');
                isExploded = false;
                console.log("ジェットエンジンを組み立てました");
            }
        });
    </script>
</body>
</html>
